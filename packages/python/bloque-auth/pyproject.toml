[project]
name = "bloque-auth"
version = "0.1.0"
description = "Authentication: JWT RS256, RBAC, brute force protection, credential encryption"
requires-python = ">=3.11"
dependencies = [
    "bloque-core",
    "pyjwt[crypto]>=2.8",
    "cryptography>=42.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "httpx>=0.27"]

[tool.uv.sources]
bloque-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bloque_auth"]
