[project]
name = "bloque-multitenant"
version = "0.1.0"
description = "PostgreSQL RLS transparent multitenancy via contextvars"
requires-python = ">=3.11"
dependencies = [
    "bloque-core",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[tool.uv.sources]
bloque-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bloque_multitenant"]
