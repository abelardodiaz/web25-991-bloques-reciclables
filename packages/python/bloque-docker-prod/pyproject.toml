[project]
name = "bloque-docker-prod"
version = "0.1.0"
description = "Production Docker infrastructure: multi-stage Dockerfile, nginx reverse proxy, hardened compose with health checks and env validation"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Abelardo Diaz", email = "abelardo@bloques.dev" },
]
keywords = ["docker", "production", "nginx", "postgresql", "redis", "health-check", "validation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: System :: Systems Administration",
    "Typing :: Typed",
]
dependencies = [
    "bloque-core",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[project.urls]
Homepage = "https://github.com/abelardodiaz/web25-991-bloques-reciclables"
Documentation = "https://github.com/abelardodiaz/web25-991-bloques-reciclables/tree/main/packages/python/bloque-docker-prod"
Repository = "https://github.com/abelardodiaz/web25-991-bloques-reciclables"
Issues = "https://github.com/abelardodiaz/web25-991-bloques-reciclables/issues"

[tool.uv.sources]
bloque-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bloque_docker_prod"]
