name: CI
on:
- push
- pull_request
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v4
    - run: uv sync --all-packages
    - run: uv run pytest
    - run: uv run ruff check .
  typescript:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: pnpm
    - run: pnpm install
    - run: pnpm run lint
    - run: pnpm run build
