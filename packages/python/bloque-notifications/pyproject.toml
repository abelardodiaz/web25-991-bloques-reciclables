[project]
name = "bloque-notifications"
version = "0.1.0"
description = "Notification orchestrator with pluggable providers (email, webhook, console) and template rendering."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Abelardo Diaz", email = "abelardo@bloques.dev" }]
keywords = [
    "notifications",
    "email",
    "webhook",
    "templates",
    "bloque",
    "composable",
    "async",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications",
    "Topic :: Communications :: Email",
    "Typing :: Typed",
]
dependencies = ["bloque-core", "httpx>=0.27"]

[project.optional-dependencies]
templates = ["jinja2>=3.1"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[project.urls]
Homepage = "https://github.com/abeldiaz/web25-991-bloques-reciclables"
Documentation = "https://github.com/abeldiaz/web25-991-bloques-reciclables/tree/main/packages/python/bloque-notifications"
Repository = "https://github.com/abeldiaz/web25-991-bloques-reciclables"
Issues = "https://github.com/abeldiaz/web25-991-bloques-reciclables/issues"

[tool.uv.sources]
bloque-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bloque_notifications"]
