[project]
name = "ulfblk-api-keys"
version = "0.1.0"
description = "API key authentication for FastAPI services"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Abelardo Diaz", email = "abelardo@bloques.dev" },
]
keywords = ["fastapi", "api-key", "authentication", "security"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "ulfblk-core>=0.1.0",
    "ulfblk-db>=0.1.0",
    "fastapi>=0.115.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
argon2 = ["argon2-cffi>=23.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "httpx>=0.27", "aiosqlite>=0.20"]

[project.urls]
Homepage = "https://github.com/abelardodiaz/web25-991-bloques-reciclables"
Documentation = "https://github.com/abelardodiaz/web25-991-bloques-reciclables/tree/main/packages/python/ulfblk-api-keys"
Repository = "https://github.com/abelardodiaz/web25-991-bloques-reciclables"

[tool.uv.sources]
ulfblk-core = { workspace = true }
ulfblk-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ulfblk_api_keys"]
